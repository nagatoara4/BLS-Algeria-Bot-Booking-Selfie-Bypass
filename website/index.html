<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLS الجزائر — حجز تلقائي مجاني</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b1220;
      --surface: #121a2b;
      --surface-2: #1a2438;
      --border: rgba(255, 255, 255, 0.08);
      --text: #eef3ff;
      --muted: #9aa8c7;
      --accent: #2dd4bf;
      --accent-2: #38bdf8;
      --gold: #f5c451;
      --success: #4ade80;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Cairo", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(45, 212, 191, 0.12), transparent 28%),
        radial-gradient(circle at bottom left, rgba(56, 189, 248, 0.1), transparent 30%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.7;
    }

    .wrap { width: min(980px, 92%); margin: 0 auto; padding: 2.5rem 0 4rem; }

    .topbar {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    html[dir="ltr"] .topbar { justify-content: flex-start; }

    .lang-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 999px;
      padding: 0.45rem 0.95rem;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .lang-btn.active {
      background: rgba(45, 212, 191, 0.15);
      border-color: rgba(45, 212, 191, 0.35);
      color: var(--accent);
    }

    .hero { text-align: center; margin-bottom: 2rem; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(45, 212, 191, 0.12);
      border: 1px solid rgba(45, 212, 191, 0.25);
      color: var(--accent);
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 0.75rem;
    }

    .hero p {
      color: var(--muted);
      max-width: 680px;
      margin: 0 auto 1.25rem;
      font-size: 1.05rem;
    }

    .stats { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.8rem 1.1rem;
      min-width: 150px;
    }

    .stat strong { display: block; color: var(--gold); font-size: 1.1rem; }
    .stat span { color: var(--muted); font-size: 0.9rem; }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 1.25rem;
      margin-top: 2rem;
    }

    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent), var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem;
      box-shadow: var(--shadow);
    }

    .card h2 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-title {
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 700;
      margin: 1.2rem 0 0.7rem;
    }

    .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; }
    @media (max-width: 640px) { .fields { grid-template-columns: 1fr; } }

    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field.full { grid-column: 1 / -1; }

    label { font-size: 0.92rem; color: var(--muted); font-weight: 600; }

    input, select {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      padding: 0.8rem 0.95rem;
      font: inherit;
    }

    input:focus, select:focus {
      outline: none;
      border-color: rgba(45, 212, 191, 0.55);
      box-shadow: 0 0 0 4px rgba(45, 212, 191, 0.12);
    }

    .hint { font-size: 0.8rem; color: #7f8dab; }

    .actions { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1.2rem; }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 0.85rem 1.2rem;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #041018;
      flex: 1;
      min-width: 220px;
    }

    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: rgba(245, 196, 81, 0.12);
      color: var(--gold);
      border: 1px solid rgba(245, 196, 81, 0.25);
      width: 100%;
    }

    .steps { display: grid; gap: 0.85rem; }

    .step {
      display: flex;
      gap: 0.85rem;
      align-items: flex-start;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.95rem;
    }

    .step-num {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent-2);
      font-weight: 800;
      flex-shrink: 0;
    }

    .step h3 { font-size: 1rem; margin-bottom: 0.2rem; }
    .step p { color: var(--muted); font-size: 0.92rem; }

    .alert {
      margin-top: 1rem;
      padding: 0.9rem 1rem;
      border-radius: 12px;
      font-size: 0.92rem;
      display: none;
    }

    .alert.show { display: block; }
    .alert.success {
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.25);
      color: #bbf7d0;
    }

    .alert.error {
      background: rgba(251, 113, 133, 0.1);
      border: 1px solid rgba(251, 113, 133, 0.25);
      color: #fecdd3;
    }

    .privacy {
      margin-top: 1rem;
      padding: 0.9rem;
      border-radius: 12px;
      background: rgba(56, 189, 248, 0.08);
      border: 1px dashed rgba(56, 189, 248, 0.25);
      color: #cfe8ff;
      font-size: 0.9rem;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 2rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 12px var(--success);
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button type="button" class="lang-btn active" data-lang="ar">العربية</button>
      <button type="button" class="lang-btn" data-lang="fr">Français</button>
    </div>

    <header class="hero">
      <div class="badge"><span class="status-dot"></span> <span data-i18n="badge"></span></div>
      <h1 data-i18n="heroTitle"></h1>
      <p data-i18n="heroDesc"></p>
      <div class="stats">
        <div class="stat"><strong>100%</strong><span data-i18n="statLocal"></span></div>
        <div class="stat"><strong data-i18n="statAuto"></strong><span>Auto</span></div>
        <div class="stat"><strong>BLS</strong><span data-i18n="statOfficial"></span></div>
      </div>
    </header>

    <div class="grid">
      <section class="card">
        <h2>📝 <span data-i18n="formTitle"></span></h2>
        <form id="booking-form" novalidate>
          <div class="section-title" data-i18n="personalSection"></div>
          <div class="fields">
            <div class="field">
              <label for="lastName" data-i18n="lastName"></label>
              <input id="lastName" name="lastName" placeholder="BENALI" required />
            </div>
            <div class="field">
              <label for="firstName" data-i18n="firstName"></label>
              <input id="firstName" name="firstName" placeholder="Ahmed" required />
            </div>
            <div class="field">
              <label for="dateOfBirth" data-i18n="dateOfBirth"></label>
              <input id="dateOfBirth" name="dateOfBirth" type="date" required />
              <span class="hint" data-i18n="dateHint"></span>
            </div>
            <div class="field">
              <label for="passportIssuePlace" data-i18n="passportIssuePlace"></label>
              <input id="passportIssuePlace" name="passportIssuePlace" placeholder="Alger" required />
            </div>
            <div class="field full">
              <label for="telegramUsername" data-i18n="telegramUsername"></label>
              <input id="telegramUsername" name="telegramUsername" placeholder="@username" />
            </div>
          </div>

          <div class="section-title" data-i18n="passportSection"></div>
          <div class="fields">
            <div class="field full">
              <label for="passportNumber" data-i18n="passportNumber"></label>
              <input id="passportNumber" name="passportNumber" placeholder="123456789" required />
            </div>
            <div class="field">
              <label for="passportIssueDate" data-i18n="passportIssueDate"></label>
              <input id="passportIssueDate" name="passportIssueDate" type="date" required />
            </div>
            <div class="field">
              <label for="passportExpiryDate" data-i18n="passportExpiryDate"></label>
              <input id="passportExpiryDate" name="passportExpiryDate" type="date" required />
            </div>
            <div class="field">
              <label for="franNumber" data-i18n="franNumber"></label>
              <input id="franNumber" name="franNumber" placeholder="TG700123456" />
            </div>
            <div class="field">
              <label for="visaTypeIndex" data-i18n="visaTypeIndex"></label>
              <input id="visaTypeIndex" name="visaTypeIndex" type="number" min="0" value="1" />
            </div>
            <div class="field">
              <label for="passportTypeIndex" data-i18n="passportTypeIndex"></label>
              <input id="passportTypeIndex" name="passportTypeIndex" type="number" min="0" value="7" />
            </div>
          </div>

          <div class="section-title" data-i18n="botSection"></div>
          <div class="fields">
            <div class="field">
              <label for="reloadIntervalSec" data-i18n="reloadIntervalSec"></label>
              <input id="reloadIntervalSec" name="reloadIntervalSec" type="number" min="10" value="30" />
            </div>
            <div class="field">
              <label for="submitIntervalSec" data-i18n="submitIntervalSec"></label>
              <input id="submitIntervalSec" name="submitIntervalSec" type="number" min="5" value="10" />
            </div>
            <div class="field full">
              <label for="playAlertSound" data-i18n="playAlertSound"></label>
              <select id="playAlertSound" name="playAlertSound">
                <option value="true">نعم</option>
                <option value="false">لا</option>
              </select>
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="btn btn-primary">🚀 <span data-i18n="generateBtn"></span></button>
            <button type="button" id="save-local" class="btn btn-secondary">💾 <span data-i18n="saveBtn"></span></button>
            <button type="button" id="clear-local" class="btn btn-secondary">🗑️ <span data-i18n="clearBtn"></span></button>
          </div>

          <div id="form-alert" class="alert"></div>
          <div class="privacy" data-i18n="privacy"></div>
        </form>
      </section>

      <aside class="card">
        <h2>⚡ <span data-i18n="howTitle"></span></h2>
        <div class="steps">
          <div class="step">
            <div class="step-num">1</div>
            <div>
              <h3 data-i18n="step1Title"></h3>
              <p data-i18n="step1Desc"></p>
            </div>
          </div>
          <div class="step">
            <div class="step-num">2</div>
            <div>
              <h3 data-i18n="step2Title"></h3>
              <p data-i18n="step2Desc"></p>
            </div>
          </div>
          <div class="step">
            <div class="step-num">3</div>
            <div>
              <h3 data-i18n="step3Title"></h3>
              <p data-i18n="step3Desc"></p>
            </div>
          </div>
          <div class="step">
            <div class="step-num">4</div>
            <div>
              <h3 data-i18n="step4Title"></h3>
              <p data-i18n="step4Desc"></p>
            </div>
          </div>
        </div>

        <div class="actions" style="margin-top: 1.2rem;">
          <a class="btn btn-link" href="https://algeria.blsspainvisa.com/" target="_blank" rel="noopener">
            🌐 <span data-i18n="openBls"></span>
          </a>
        </div>
      </aside>
    </div>

    <footer data-i18n="footer"></footer>
  </div>

  <script src="config.js"></script>
  <script src="i18n.js"></script>
  <script src="telegram.js"></script>
  <script src="app.js"></script>
</body>
</html>
